name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate i18n and build
        env:
          SCHEMA_TRIAD_BASE: ${{ github.event.before }}
          SCHEMA_TRIAD_HEAD: ${{ github.sha }}
        run: |
          npm ci
          npm run e2e:install
          npm run ci:schema-triad
          npm run verify:quick
          npm run build

      - name: Prepare VPS permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo -n /usr/bin/chown -R "$(id -un):$(id -gn)" /var/www/guildforce

      - name: Sync app to VPS
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete --exclude=node_modules --exclude=.git --exclude=.env --exclude=supabase/.temp
          path: ./
          remote_path: /var/www/guildforce/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Install and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/guildforce
            npm ci
            npm run build
            sudo -n /usr/bin/systemctl reload nginx
