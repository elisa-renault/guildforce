name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app to VPS
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete --exclude=node_modules --exclude=.git
          path: ./
          remote_path: /var/www/guildforce/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Install and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/guildforce
            npm ci
            npm run build
            sudo -n /usr/bin/install -m 0644 /var/www/guildforce/nginx/guildforce.conf /etc/nginx/sites-available/guildforce.conf
            sudo -n /usr/bin/ln -sf /etc/nginx/sites-available/guildforce.conf /etc/nginx/sites-enabled/guildforce.conf
            sudo -n /usr/sbin/nginx -t
            sudo -n /usr/bin/systemctl reload nginx
