server {
  listen 80;
  server_name guildforce.app www.guildforce.app;

  root /var/www/guildforce/dist;
  index index.html;

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /logos/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  location / {
    try_files $uri /index.html;
  }
}
